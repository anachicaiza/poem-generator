<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <title>Poem Generator</title>
</head>

<body>
    <div class="container">

        <header>
            <h1>Poem Generator</h1>
            <p></p>
        </header>

        <div class="form-container">
            <form class="search-form" id="search-form">
                <input type="search" class="instructions" placeholder="Enter the topic of the poem?" required
                    id="instructions" class="search-form-input" />
                <input type="submit" value="Generate Poem" class="button" id="submit-button" />
            </form>
        </div>
        <div class="hint">i.e: Flower, Paris or Cheese</div>
        <div id="poem" class="poem">
        </div>
        <footer>
            This project was coded by <a href="https://github.com/anachicaiza" target="_blank">Ana Chicaiza</a>, is
            open-sourced
            in <a href="https://github.com/anachicaiza/Weather_app" target="_blank">GitHub</a> and hosted on <a
                href="https://shecodes-weather-application-project.netlify.app" target="_blank">Netlify</a>
        </footer>
    </div>
    <script src="index.js"></script>
</body>

</html>
